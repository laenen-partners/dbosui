root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/dbosui ./cmd/dbosui"
  bin = "./tmp/dbosui"
  # Real-database mode: --database-url comes from DBOS_POSTGRES_URL / DATABASE_URL.
  args_bin = ["serve"]
  include_ext = ["go"]
  exclude_dir = ["tmp", "bin", "web", "node_modules", ".git", "gen"]
  exclude_regex = ["_test\\.go$"]
  delay = 500
  stop_on_error = true
  send_interrupt = true
  kill_delay = "2s"

[log]
  time = false

[misc]
  clean_on_exit = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"
