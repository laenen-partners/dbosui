version: "3"

# Task definitions live in mise.yaml. This Taskfile is a thin shim so that
# `task <name>` still works for anyone who prefers Task as their runner —
# it just forwards to `mise run <name>`.

vars:
  RUNNER: mise run

tasks:
  default:
    cmds:
      - "{{.RUNNER}} run"

  # ── Setup ─────────────────────────────────────────────────────────────────
  setup:        { cmds: ["{{.RUNNER}} setup"] }
  generate:     { cmds: ["{{.RUNNER}} generate"] }

  # ── Build / run ───────────────────────────────────────────────────────────
  web:dev:      { cmds: ["{{.RUNNER}} web:dev"] }
  web:build:    { cmds: ["{{.RUNNER}} web:build"] }
  web:typecheck: { cmds: ["{{.RUNNER}} web:typecheck"] }
  go:dev:       { cmds: ["{{.RUNNER}} go:dev"] }
  go:dev:db:    { cmds: ["{{.RUNNER}} go:dev:db"] }
  dev:          { cmds: ["{{.RUNNER}} dev"] }
  dev:db:       { cmds: ["{{.RUNNER}} dev:db"] }
  build:        { cmds: ["{{.RUNNER}} build"] }
  run:          { cmds: ["{{.RUNNER}} run"] }
  run:mock:     { cmds: ["{{.RUNNER}} run:mock"] }

  # ── Quality gates ─────────────────────────────────────────────────────────
  format:       { cmds: ["{{.RUNNER}} format"] }
  lint:         { cmds: ["{{.RUNNER}} lint"] }
  test:         { cmds: ["{{.RUNNER}} test"] }
  ci:           { cmds: ["{{.RUNNER}} ci"] }

  # ── Release ───────────────────────────────────────────────────────────────
  release:dist: { cmds: ["{{.RUNNER}} release:dist"] }
